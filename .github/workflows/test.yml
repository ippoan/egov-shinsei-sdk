name: CI

on:
  pull_request:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      project_type: 'worker'
      has_tests: true
      has_deploy: false
      has_staging_deploy: false
      typecheck_command: 'npx tsc --noEmit --skipLibCheck'
      test_command: 'npx vitest run --coverage --reporter=default --reporter=json --outputFile.json=coverage/test-results.json'
      npm_scope: '@ippoan'
      npm_publish_directory: '.'
      npm_publish_name: 'egov-shinsei-sdk'
